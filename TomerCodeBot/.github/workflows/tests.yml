name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GEMINI_API_KEY: dummy
          GROQ_API_KEY: dummy
          TELEGRAM_TOKEN: dummy
        run: pytest tests/ -v
