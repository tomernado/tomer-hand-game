<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Zone • Your Web Arcade</title>
    <meta name="description" content="A clean hub for your Python games, playable on the web." />
    <link rel="preload" as="image" href="assets/logo.svg">
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="logo">
        <img src="assets/logo.svg" alt="Game Zone logo" width="40" height="40">
        <h1>Game Zone</h1>
      </div>
      <div class="actions">
        <input id="search" class="search" type="search" placeholder="Search games..." aria-label="Search games">
        <button id="themeToggle" class="btn" type="button" aria-label="Toggle theme">🌓</button>
      </div>
    </header>

    <main class="content">
      <section class="intro">
        <h2>Your games, neatly organized</h2>
        <p>Add each game as a card below. Click to open and play.</p>
      </section>

      <section id="gameGrid" class="grid"></section>
    </main>

    <footer class="site-footer">
      <p>© <span id="year"></span> Game Zone. Built by You.</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
